<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Fox Mood Calendar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Fox Mood Calendar 🦊</h1>
<p>Mark the vibe of the day</p>

<div class="calendar-header">

<button id="prevMonth">←</button>

<h2 id="monthYear"></h2>

<button id="nextMonth">→</button>

</div>

<div class="calendar" id="calendar"></div>

<div class="emoji-picker" id="emojiPicker">

<img src="fox-happy.png" data-emoji="happy">
<img src="fox-cry.png" data-emoji="sad">
<img src="swing.png" data-emoji="major">

<span data-emoji="clear">❌</span>

</div>

<script src="script.js"></script>

</body>
</html>
